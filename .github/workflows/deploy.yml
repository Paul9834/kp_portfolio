name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build Angular
        run: npm run build -- --configuration production

      - name: Deploy al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Mantenemos browser y server
          source: "dist/portfolio/**"
          target: /var/www/paul9834
          # Saltamos 'dist' y 'portfolio' (2 niveles)
          strip_components: 2

      - name: Reiniciar PM2 y Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Entramos a la carpeta del motor SSR que ahora sí existirá
            cd /var/www/paul9834/server
            # Instalamos dependencias del servidor si es necesario
            npm install --production || true
            # Matamos proceso viejo y lanzamos el nuevo
            pm2 delete paul-portfolio || true
            pm2 start server.mjs --name "paul-portfolio"
            pm2 save
            # Refrescamos Nginx
            sudo systemctl restart nginx
